# §5 — VLM training on CLEVR.
#
# The ViT weights must come from your §3 EuroSAT CLIP run (same architecture as below):
#   uv run python scripts/pretrain_clip.py --config configs/clip_eurosat.yaml --output-dir runs/clip_eurosat
# Then pass  --pretrained-vit runs/clip_eurosat/best.pt  (contains vit_state_dict). Do not use an untrained ViT.

vit:
  img_size: 64
  patch_size: 8
  d_model: 384
  num_heads: 6
  num_blocks: 6
  dropout: 0.1

data:
  root: data/clevr_mini
  img_size: 64

decoder:
  model_name: HuggingFaceTB/SmolLM2-360M-Instruct
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

projector:
  expansion: 4

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 50
  scheduler: cosine

train:
  num_steps: 2000
  batch_size: 32
  gradient_accumulation_steps: 1
  num_workers: 4
  log_every: 25
  eval_every_steps: 200
  eval_max_examples: 500
  max_grad_norm: 1.0

generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 1.0
  top_p: 1.0
