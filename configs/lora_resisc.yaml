# §4 — RESISC45 fine-tuning. Used for full FT, LoRA, and linear probe runs.
# `--method` is set on the command line; this config provides shared settings.

num_classes: 45

optim:
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 100
  scheduler: cosine

train:
  batch_size: 128
  num_epochs: 10
  num_workers: 4
  log_every: 25
  eval_every_epoch: 1

# Per-method blocks (shared LR across methods for §4 comparison).
methods:
  linear_probe:
    lr: 1.0e-4
  lora:
    lr: 1.0e-4
  full_ft:
    lr: 1.0e-4

# LoRA rank sweep: `uv run python scripts/finetune_resisc.py ... --method lora --lora-rank-sweep`
# W&B Sweep (grid over rank): add `--wandb-sweep` (requires W&B login / `WANDB_API_KEY`).
# Uses α = alpha_scale · r so α/r stays constant (default 2 → α = 2r).
lora_rank_sweep:
  ranks: [1, 2, 4, 8, 16, 32, 64]
  alpha_scale: 2.0
  wandb_project: resisc45-finetune
  wandb_sweep_name: lora-rank-resisc45
